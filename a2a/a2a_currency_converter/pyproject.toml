[project]
name = "a2a-sample-agent-langgraph"
version = "0.1.0"
description = "Sample LangGraph currency agent with A2A Protocol"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "a2a-sdk[http-server]>=0.2.5,<0.4.0",
    "click>=8.1.8",
    "httpx>=0.28.1",
    "langchain-google-genai>=2.0.10",
    "langgraph>=0.3.18",
    "pydantic>=2.10.6",
    "python-dotenv>=1.1.0",
    "uvicorn>=0.34.2",
    "langchain-openai>=0.2.14",
    "pydantic-settings>=2.9.1",
    "openinference-instrumentation-langchain>=0.1.36",
    "opentelemetry-exporter-otlp>=1.33.1",
    # The following are to avoid CVEs reported by Trivy and checked by our CI
    "urllib3>=2.6.0",
    "starlette>=0.49.1",
    "pyasn1>=0.6.3",            # Indirect; prevents CVE-2026-30922
    "protobuf>=5.29.6",
    "langgraph-checkpoint>=3.0.0",
    "langchain-core>=1.2.22",   # Indirect; prevents CVE-2026-34070
]

[tool.hatch.build.targets.wheel]
packages = ["app"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
