[project]
name = "generic-agent"
version = "0.0.1"
description = "Simple ollama-based Langgraph agent with MCP tool calling."
requires-python = ">=3.11"
dependencies = [
    "a2a-sdk>=1.0.3",
    "langgraph>=0.2.55",
    "langchain-core>=1.3.3",
    "langchain-community>=0.3.27",
    "langchain-ollama>=0.2.1",
    "langchain-openai>=0.3.7",
    "openinference-instrumentation-langchain>=0.1.36",
    "pydantic-settings>=2.14.1",
    "langchain-mcp-adapters>=0.1.0",
    "python-keycloak>=5.5.1",
    "opentelemetry-exporter-otlp",
    "urllib3>=2.7.0",   # Indirect; prevents CVE-2025-66418
    "python-multipart>=0.0.28", # Indirect; prevents CVE-2026-24486
]

[project.scripts]
server = "generic_agent.agent:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
