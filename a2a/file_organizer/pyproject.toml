[project]
name = "file-organizer"
version = "0.0.1"
description = "Simple file organizer using A2A SDK and LangGraph"
authors = [
    { name = "Ethan Levine" }
]
readme = "README.md"
license = { text = "Apache" }
requires-python = ">=3.11"
dependencies = [
    "a2a-sdk>=0.3.26",
    "langgraph>=0.2.55",
    "langchain-core>=1.2.31",
    "langchain-community>=0.4.1",
    "langchain-ollama>=0.2.1",
    "langchain-openai>=0.3.7",
    "openinference-instrumentation-langchain>=0.1.62",
    "pydantic-settings>=2.14.0",
    "langchain-mcp-adapters>=0.1.0",
    "python-keycloak>=7.1.1",
    "opentelemetry-exporter-otlp",
    "urllib3>=2.6.3",   # Indirect; prevents CVE-2025-66418
    "python-multipart>=0.0.22", # Indirect; prevents CVE-2026-24486
]

[project.scripts]
server = "file_organizer.agent:run"


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
